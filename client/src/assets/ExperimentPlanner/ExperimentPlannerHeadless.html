<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>DIALS Experiment Planner</title>
	<style>
		body{
			margin: 0
		}
		::-webkit-scrollbar { width: 6px; height: 6px; }
		::-webkit-scrollbar-track { background: transparent; }
		::-webkit-scrollbar-thumb { background: hsl(217.2 32.6% 28%); border-radius: 3px; }
		::-webkit-scrollbar-thumb:hover { background: hsl(217.2 32.6% 40%); }
		::-webkit-scrollbar-corner { background: transparent; }
	</style>
  <script type="module" crossorigin src="./assets/main-D4Qm4MEF.js"></script>
</head>
<body>
	<header id="headerText"> </header>
	<p id="errorText"> </p>
	<sidebar id="sidebar" style="width: 230px; padding: 10px;"> 
		<button id="sidebarToggle" onclick="window.viewer.toggleSidebar()" aria-label="Toggle sidebar">
			❮
		</button>
		<script>
			function updateObservedUnindexedReflections(){
				window.viewer.disableMouseClick(); 
				window.viewer.updateObservedUnindexedReflections()
			}

			function updateObservedIndexedReflections(){
				window.viewer.disableMouseClick(); 
				window.viewer.updateObservedIndexedReflections()
			}

			function updateCalculatedReflections(){
				window.viewer.disableMouseClick(); 
				window.viewer.updateCalculatedReflections()
			}

			function updateReflectionSize(){
				window.viewer.disableMouseClick();
				window.viewer.updateReflectionSize();
			}

			function updateReciprocalCell(){
				window.viewer.disableMouseClick();
				window.viewer.updateReciprocalCell();
			}
			function updateActivePredictedReflections(){
				var goniometerSlider = document.getElementById("goniometerPhiSlider");
  				var goniometerValue = document.getElementById("goniometerValue");
  				goniometerValue.innerHTML = goniometerSlider.value + "°";
				window.viewer.disableMouseClick();
				window.viewer.updateActivePredictedReflections();
			}
			function updateGoniometerPhi(){
				var goniometerSlider = document.getElementById("goniometerPhiSlider");
  				var goniometerValue = document.getElementById("goniometerValue");
  				goniometerValue.innerHTML = goniometerSlider.value + "°";
			}

			function updateMillerIndexLabels(){
				window.viewer.disableMouseClick();
				window.viewer.updateMillerIndexLabelsVisibility();
			}

			function updateMillerIndexLabelSize(){
				window.viewer.disableMouseClick();
				window.viewer.updateMillerIndexLabelSize();
			}

		</script>
		<div id="reflectionSizeContainer" class="slider-container">
		<b>reflection size:</b>  <input type="range" min="1" max="75" value="10" 
		class="slider" id="reflectionSizeSlider" 
		onmouseup="updateReflectionSize()">
		</div>

		<div id="goniomterPhiContainer" class="slider-container">
		<b>φ:</b>  <input type="range" min="0" max="359" value="1"
		class="slider" id="goniometerPhiSlider"
		onmouseup="updateActivePredictedReflections()" onmousemove="updateGoniometerPhi()"><span id="goniometerValue"></span><br>
		</div>

		<div class="checkbox-row">
		<b>Miller indices:</b> <input type="checkbox" id="millerIndexLabelsCheckbox" onclick="updateMillerIndexLabels()">
		</div>

		<div style="margin-top: 10px;"></div>

		<div id="millerIndexLabelSizeContainer" class="slider-container">
		<b>label size:</b>  <input type="range" min="5" max="50" value="8"
		class="slider" id="millerIndexLabelSizeSlider"
		onmouseup="updateMillerIndexLabelSize()">
		</div>

	</sidebar>
	<footer id="footerText"> </footer>
	<button class="btn" id="closeExpt" onmouseout="window.viewer.stopDisplayingText()" onmouseover="window.viewer.displayImageFilenames()" onclick="window.viewer.clearExperiment()"><i class="fa fa-trash"></i> expt file</button>
	<button class="btn" id="closeRefl" onmouseout="window.viewer.stopDisplayingText()" onmouseover="window.viewer.displayNumberOfReflections()" onclick="window.viewer.clearReflectionTable()"><i class="fa fa-trash"></i> refl file</button>
		<style>
		.slider {
			margin-top: 0px;
			vertical-align: middle;
			appearance: none;
			-webkit-appearance: none;
			height: 6px;
			background: #1e293b; /* Right side (unfilled) color */
			border-radius: 5px;
			/* For Firefox */
			--fill-color: #f8fafc; /* Color for filled portion */
		}

		/* WebKit browsers (Chrome, Safari) */
		.slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 16px;
			height: 16px;
			border-radius: 50%;
			background: black;
			border: 2px solid #f8fafc;
			cursor: pointer;
			margin-top: -5px; /* Centers thumb on track */
		}

		.slider::-webkit-slider-runnable-track {
			height: 6px;
			background: linear-gradient(to right, var(--fill-color) 0%, var(--fill-color) var(--fill-percent), #444 var(--fill-percent), #444 100%);
		}

		/* Firefox */
		.slider::-moz-range-thumb {
			width: 16px;
			height: 16px;
			border-radius: 50%;
			background: black;
			border: 2px solid #f8fafc;
			cursor: pointer;
		}

		.slider::-moz-range-progress {
			height: 6px;
			background: #f8fafc; /* Filled portion color */
			border-radius: 5px;
		}

		.slider::-moz-range-track {
			height: 6px;
			background: #444; /* Unfilled portion color */
			border-radius: 5px;
		}
		.slider-container {
		display: flex;
		align-items: center;   
		white-space: nowrap;  
		margin-bottom: 10px; 
		}
		.slider-container b {
			flex-shrink: 0;  
		}
		.slider-container input[type="range"] {
			flex-grow: 1;    
			min-width: 50px; 
			max-width: 50%; 
		}
		#headerText {
			font-size: 16px;
			font-family: Tahoma, Verdana, sans-serif;
			color: #ddd;
			background-color: rgba(0,1,0,0.7);
			text-align: center;
			position: absolute;
			top: 10px;
			left: 50%;
			transform: translateX(-50%);
			padding: 8px 8px;
			border-radius: 10px;
			z-index: 9;
			white-space: pre-line;
		}
		#errorText {
			font-size: 16px;
			font-family: Tahoma, Verdana, sans-serif;
			color: #e74c3c;
			background-color: rgba(0,1,0,0.7);
			text-align: center;
			position: absolute;
			top: 10px;
			left: 50%;
			transform: translateX(-50%);
			padding: 8px 8px;
			border-radius: 10px;
			z-index: 9;
			white-space: pre-line;
		}
		#sidebar {
			display: block; 
			font-family: Tahoma, Verdana, sans-serif;
			font-size: 12px;
			color: #ddd;
			background-color: rgba(0,1,0,0.7);
			position: absolute;
			left: 20px;
			top: 50%;
			transform: translateY(-50%);
			cursor: default;
			padding: 8px 8px 20px;
			border-radius: 10px;
			z-index: 9;
			line-height: 1.2;
		}
		#sidebar.hidden {
		transform: translate(-260px, -50%);
		}
		#sidebarToggle {
			position: absolute;
			right: -0px;
			top: 50%;
			transform: translateY(-50%);
			background: none;
			border: #fff;
			color: #ddd;
			font-size: 22px;
			cursor: pointer;
			padding: 0;
			line-height: 1;
		}
		#sidebar.hidden #sidebarToggle {
			transform: translateY(-50%) rotate(180deg);
		}
		#closeExpt{
			display: none;
			font-family: Tahoma, Verdana, sans-serif;
			font-size: 14px;
			color: #ddd;
			background-color: rgba(0,1,0,0.7);
			position: absolute;
			left: 1%;
			top: 5%;
			cursor: pointer;
			padding: 8px 8px 8px;
			border-radius: 10px;
			z-index: 9;
			line-height: .7;
		}
		#closeRefl{
			display: none;
			font-family: Tahoma, Verdana, sans-serif;
			font-size: 14px;
			color: #ddd;
			background-color: rgba(0,1,0,0.7);
			position: absolute;
			left: 1%;
			top: 10%;
			cursor: pointer;
			padding: 8px 8px 8px;
			border-radius: 10px;
			z-index: 9;
			line-height: .7;
		}
		#reflectionSize{
			position: relative;
			top:8px;
		}
		#goniometerPhi{
			position: relative;
			top:8px;
		}
		#goniometerTheta{
			position: relative;
			top:8px;
		}
		</style>

	
</body>
</html>
